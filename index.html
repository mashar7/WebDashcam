<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cloud Continuous Recorder</title>
    <script src="https://accounts.google.com/gsi/client"></script>
    <style>
        body { font-family: sans-serif; text-align: center; background: #121212; color: white; margin: 0; padding: 20px; }
        video { width: 100%; max-width: 400px; background: black; border-radius: 8px; margin-bottom: 10px; transform: scaleX(1); }
        button { padding: 12px 20px; margin: 5px; font-size: 15px; cursor: pointer; border: none; border-radius: 6px; font-weight: bold; transition: background 0.2s; }
        button:active { opacity: 0.8; }
        .btn-login { background: #4285F4; color: white; }
        .btn-start { background: #0F9D58; color: white; }
        .btn-record { background: #DB4437; color: white; }
        .btn-stop { background: #F4B400; color: #121212; }
        #logArea { margin-top: 20px; text-align: left; font-family: monospace; font-size: 12px; background: #1e1e1e; padding: 12px; border-radius: 6px; height: 180px; overflow-y: auto; color: #00ff00; border: 1px solid #333; }
    </style>
</head>
<body>

    <h2>DriveCam (Web Version)</h2>
    <video id="preview" autoplay muted playsinline></video>
    <br>
    <button class="btn-login" onclick="loginGoogle()">1. Login Google Drive</button>
    <button class="btn-start" onclick="startCamera()">2. Nyalakan Kamera</button>
    <br>
    <button class="btn-record" onclick="startRecordingCycle()">3. Mulai Rekam</button>
    <button class="btn-stop" onclick="stopRecording()">Berhenti</button>

    <div id="logArea"></div>

    <script>
        // ==================== KONFIGURASI PENTING ====================
        // Ganti dengan Client ID yang Anda dapatkan dari Google Cloud Console
        const CLIENT_ID = '892470355802-65m6s9hsmnj0mf7qlar0qfj745lh04b8.apps.googleusercontent.com'; 
        
        // Durasi potongan video (5 menit = 5 * 60 * 1000 milidetik)
        // REKOMENDASI: Ubah jadi 60000 (1 menit) saat pertama kali uji coba agar tidak kelamaan menunggu
        const CHUNK_DURATION = 1 * 60 * 1000; 
        // =============================================================

        let accessToken = null;
        let client = null;
        let stream = null;
        let mediaRecorder = null;
        let recordedChunks = [];
        let recordTimer = null;
        let wakeLock = null;

        const logArea = document.getElementById('logArea');

        function log(message) {
            const time = new Date().toLocaleTimeString();
            logArea.innerHTML += `[${time}] ${message}<br>`;
            logArea.scrollTop = logArea.scrollHeight;
        }

        // 1. OTORISASI GOOGLE (Diperbaiki agar tidak memicu 'google is not defined')
        function loginGoogle() {
            if (typeof google === 'undefined') {
                log('EROR: Sistem Google belum siap/terblokir AdBlock. Tunggu sebentar atau matikan adblock.');
                alert("Sistem Google belum selesai dimuat oleh browser. Silakan coba lagi dalam beberapa detik.");
                return;
            }

            if (!client) {
                client = google.accounts.oauth2.initTokenClient({
                    client_id: CLIENT_ID,
                    scope: 'https://www.googleapis.com/auth/drive.file',
                    callback: (tokenResponse) => {
                        if (tokenResponse && tokenResponse.access_token) {
                            accessToken = tokenResponse.access_token;
                            log('Berhasil login! Otorisasi Google Drive sukses.');
                        } else {
                            log('Gagal mendapatkan token akses.');
                        }
                    },
                });
            }
            client.requestAccessToken();
        }

        // 2. AKSES KAMERA HP & WAKE LOCK (Layar anti-mati)
        async function startCamera() {
            try {
                // Menggunakan kamera belakang ('environment'). Ubah ke 'user' jika ingin kamera depan.
                stream = await navigator.mediaDevices.getUserMedia({ 
                    video: { facingMode: 'environment', width: { ideal: 1280 }, height: { ideal: 720 } }, 
                    audio: true 
                });
                document.getElementById('preview').srcObject = stream;
                log('Kamera belakang berhasil diaktifkan.');

                // Mengaktifkan Fitur Wake Lock agar layar HP tidak mengunci/mati otomatis
                if ('wakeLock' in navigator) {
                    try {
                        wakeLock = await navigator.wakeLock.request('screen');
                        log('Fitur Layar Selalu Menyala (Wake Lock) AKTIF.');
                    } catch (err) {
                        log('Wake Lock gagal aktif: ' + err.message);
                    }
                }
            } catch (err) {
                log('Gagal mengakses kamera/mikrofon: ' + err.message);
                alert('Pastikan memberikan izin kamera dan mikrofon di browser Anda!');
            }
        }

        // 3. SIKLUS PEREKAMAN
        function startRecordingCycle() {
            if (!accessToken) {
                alert("Harap lakukan Langkah 1 (Login Google) terlebih dahulu!");
                return;
            }
            if (!stream) {
                alert("Harap lakukan Langkah 2 (Nyalakan Kamera) terlebih dahulu!");
                return;
            }
            if (mediaRecorder && mediaRecorder.state !== 'inactive') {
                log("Perekaman sudah berjalan.");
                return;
            }
            
            log("Siklus perekaman otomatis dimulai...");
            recordSegment();
        }

        function recordSegment() {
            recordedChunks = [];
            
            // Menggunakan format WebM berkulitas baik dengan kompresi hemat memori
            mediaRecorder = new MediaRecorder(stream, { mimeType: 'video/webm; codecs=vp9,opus' });

            mediaRecorder.ondataavailable = (e) => {
                if (e.data && e.data.size > 0) {
                    recordedChunks.push(e.data);
                }
            };

            mediaRecorder.onstop = async () => {
                log(`Sesi rekaman disimpan di RAM sementara. Membersihkan RAM perangkat...`);
                const blob = new Blob(recordedChunks, { type: 'video/webm' });
                
                // Menghapus data array chunks agar memori RAM internal HP langsung kosong kembali
                recordedChunks = []; 
                
                // Mulai proses upload secara background
                uploadToDrive(blob); 
            };

            // Mulai merekam
            mediaRecorder.start();
            log(`Sedang merekam bagian baru (Durasi maksimal: ${CHUNK_DURATION / 60000} menit)...`);

            // Pengatur waktu otomatis untuk memotong video tiap interval menit yang ditentukan
            recordTimer = setTimeout(() => {
                if (mediaRecorder && mediaRecorder.state !== 'inactive') {
                    mediaRecorder.stop(); // Memicu event onstop -> upload data
                    recordSegment();      // Langsung melanjutkan perekaman segmen berikutnya tanpa jeda
                }
            }, CHUNK_DURATION);
        }

        function stopRecording() {
            clearTimeout(recordTimer);
            if (mediaRecorder && mediaRecorder.state !== 'inactive') {
                mediaRecorder.stop();
            }
            if (wakeLock !== null) {
                wakeLock.release().then(() => { wakeLock = null; });
                log('Wake lock dinonaktifkan (Layar kembali ke mode normal).');
            }
            log("Siklus perekaman dihentikan secara total.");
        }

        
        // 4. PROSES UPLOAD KE GOOGLE DRIVE (KE DALAM FOLDER SPESIFIK)
        async function uploadToDrive(blob) {
            log('Memulai upload ke Google Drive...');
            
            // MASUKKAN FOLDER ID ANDA DI SINI
            const FOLDER_ID = '1A2b3C4d5E6f7G8h9I0jKlMnOpQrStUvW'; // Ganti dengan ID dari Langkah 1

            try {
                // TAHAP A: Unggah file mentah (media)
                const response = await fetch('https://www.googleapis.com/upload/drive/v3/files?uploadType=media', {
                    method: 'POST',
                    headers: {
                        'Authorization': 'Bearer ' + accessToken,
                        'Content-Type': 'video/webm'
                    },
                    body: blob
                });
                
                if (!response.ok) throw new Error('Gagal mengirim file ke server Google.');
                const fileData = await response.json();

                // TAHAP B: Ubah nama file DAN pindahkan ke folder spesifik
                const formatTime = new Date().toLocaleString('id-ID').replace(/\//g, '-').replace(/:/g, '.');
                const fileName = `DriveCam_${formatTime}.webm`;

                // Menambahkan parameter ?addParents=FOLDER_ID pada URL
                const patchUrl = `https://www.googleapis.com/drive/v3/files/${fileData.id}?addParents=${FOLDER_ID}`;

                const metadataResponse = await fetch(patchUrl, {
                    method: 'PATCH',
                    headers: {
                        'Authorization': 'Bearer ' + accessToken,
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({ name: fileName })
                });

                if (metadataResponse.ok) {
                    log(`🎉 SUKSES! File <b>${fileName}</b> berhasil masuk ke folder khusus.`);
                } else {
                    log(`File terupload tapi gagal dipindah ke folder (ID: ${fileData.id})`);
                }

                // Memastikan objek blob dihancurkan agar memori benar-benar bersih 100%
                blob = null; 

            } catch (error) {
                log('❌ PROSES UPLOAD GAGAL: ' + error.message);
            }
        }
    </script>
</body>
</html>
